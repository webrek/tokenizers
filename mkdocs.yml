site_name: tokenizers
site_description: >-
  Native PHP extension for byte-exact LLM token counting (BPE, WordPiece,
  Unigram) plus a pure-PHP companion that counts Claude and Gemini tokens via
  their official APIs.
site_author: webrek

# Published under github.com/webrek/tokenizers (matches the Composer vendor name).
site_url: https://webrek.github.io/tokenizers/
repo_url: https://github.com/webrek/tokenizers
repo_name: webrek/tokenizers
edit_uri: edit/main/docs/

# Internal design specs/plans live under docs/superpowers/ — keep them out of the site.
exclude_docs: |
  superpowers/

# With `mkdocs build --strict`, these warnings become hard errors, so broken
# in-page anchors and dead relative links fail the build.
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      # GitHub-style slugify: matches the in-page TOC anchors (headings contain
      # em dashes and code spans like `\Tokenizers\Remote`), which were authored
      # against GitHub's slug rules rather than MkDocs' stricter default.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Loading models: guides/loading-models.md
      - Estimating LLM costs: guides/estimating-costs.md
      - Remote providers (Claude / Gemini): guides/remote-providers.md
  - API Reference: api-reference.md
  - Status & Limitations: status.md
